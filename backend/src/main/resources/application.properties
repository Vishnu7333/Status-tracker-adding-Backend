spring.application.name=status-tracker
server.port=${PORT:8080}

# Database Configuration (Defaults to local H2, overrides with environment variables for PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/status_tracker_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
